services:
  bookin:
    image: ghcr.io/adriel-m/bookin:latest
    pull_policy: always
    container_name: bookin
    restart: unless-stopped
    volumes:
      - ./input:/input          # drop ebooks here to be processed
      - ./output:/output        # organized output appears here
    environment:
      - TZ=America/New_York
      # - BOOKIN_TEMPLATE={authors}/{title}
      # - BOOKIN_LOG_LEVEL=INFO
